steps:
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'backend'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/agendamentos-api:$COMMIT_SHA', '.']

  - name: 'gcr.io/cloud-builders/docker'
    dir: 'backend'
    args: ['push', 'gcr.io/$PROJECT_ID/agendamentos-api:$COMMIT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    dir: 'backend'
    entrypoint: gcloud
    args: 
      - 'run'
      - 'deploy'
      - 'agendamentos-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/agendamentos-api:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/agendamentos-api:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
